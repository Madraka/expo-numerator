name: Publish

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write
  id-token: write

concurrency:
  group: publish-${{ github.ref_name }}
  cancel-in-progress: false

jobs:
  publish:
    name: Publish npm package and GitHub release
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: |
            package-lock.json
            example/package-lock.json
          registry-url: https://registry.npmjs.org

      - name: Install package dependencies
        run: npm ci

      - name: Install example dependencies
        run: npm run example:install

      - name: Full release gate
        run: npm run prepublishOnly

      - name: Create package tarball
        run: |
          npm pack
          echo "TARBALL=$(ls expo-numerator-*.tgz | tail -n 1)" >> "$GITHUB_ENV"

      - name: Publish to npm
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npm publish "$TARBALL" --access public --provenance

      - name: Create GitHub release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ github.ref_name }}" "$TARBALL" \
            --title "expo-numerator ${{ github.ref_name }}" \
            --notes-file CHANGELOG.md
