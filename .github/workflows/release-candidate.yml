name: Release Candidate

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: Expected release tag, for example v0.1.0.
        required: true
        type: string

permissions:
  contents: read

concurrency:
  group: release-candidate-${{ github.event.inputs.release_tag }}
  cancel-in-progress: false

jobs:
  validate:
    name: Validate release candidate
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      RELEASE_TAG: ${{ github.event.inputs.release_tag }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: |
            package-lock.json
            example/package-lock.json

      - name: Install package dependencies
        run: npm ci

      - name: Install example dependencies
        run: npm run example:install

      - name: Full release gate
        run: npm run prepublishOnly

      - name: Build release reports
        run: |
          mkdir -p reports
          npm run --silent value-format:report > reports/value-format.json
          npm run --silent input:replay:report > reports/input-replay.json
          npm run --silent benchmark:report > reports/benchmark.json

      - name: Upload release reports
        uses: actions/upload-artifact@v4
        with:
          name: release-reports-${{ github.event.inputs.release_tag }}
          path: reports

      - name: Dry-run npm pack
        run: npm pack --dry-run
